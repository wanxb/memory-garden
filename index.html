<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>记忆花园 | Memory Garden</title>
  <meta name="description" content="把一句话种进夜里，长成一株会发光的小植物。一个可独立部署的情绪互动网页。" />
  <meta name="theme-color" content="#08111d" />
  <meta property="og:title" content="记忆花园 | Memory Garden" />
  <meta property="og:description" content="把一句话种进夜里，长成一株会发光的小植物。" />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/app.css" />
</head>
<body>
  <canvas id="garden"></canvas>
  <div class="ui">
    <div class="topbar">
      <div class="brand">
        <div class="kicker">Interactive Poetry Object</div>
        <h1>记忆花园</h1>
        <p>点击夜空，种下一句会发光的话。它会长成一株轻轻摇晃的小植物，把网页变成一片能存放情绪的夜地。</p>
      </div>
      <div class="controls">
        <button id="plantBtn">种一句话</button>
        <button id="randomBtn">随机一句</button>
        <button id="bloomBtn">来一场流星雨</button>
        <button id="clearBtn">清空花园</button>
        <a class="icon-link" href="https://github.com/wanxb/memory-garden" target="_blank" rel="noopener noreferrer" aria-label="查看 GitHub 仓库" title="GitHub 仓库">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path fill="currentColor" d="M12 2C6.48 2 2 6.59 2 12.24c0 4.52 2.87 8.36 6.84 9.71.5.1.68-.22.68-.49 0-.24-.01-.89-.01-1.75-2.78.62-3.37-1.37-3.37-1.37-.45-1.18-1.11-1.49-1.11-1.49-.91-.64.07-.63.07-.63 1 .07 1.53 1.06 1.53 1.06.9 1.56 2.35 1.11 2.92.85.09-.67.35-1.11.63-1.36-2.22-.26-4.55-1.14-4.55-5.07 0-1.12.39-2.03 1.03-2.75-.1-.27-.45-1.31.1-2.74 0 0 .84-.28 2.75 1.05A9.3 9.3 0 0 1 12 6.82c.85 0 1.7.12 2.5.36 1.9-1.33 2.74-1.05 2.74-1.05.55 1.43.2 2.47.1 2.74.65.72 1.03 1.63 1.03 2.75 0 3.94-2.34 4.8-4.57 5.06.36.32.68.95.68 1.92 0 1.39-.01 2.5-.01 2.84 0 .27.18.59.69.49A10.23 10.23 0 0 0 22 12.24C22 6.59 17.52 2 12 2z"/>
          </svg>
        </a>
      </div>
    </div>

    <div></div>

    <div class="panel">
      <h2>把一句话种进夜里</h2>
      <p>每次点击，都会长出一株带着句子的微光植物。它不解决问题，但会让页面多一点呼吸感，这就已经挺值了。</p>
      <div class="quote" id="quoteBox">试试点击任意位置，或者点右上角“种一句话”。</div>
      <div class="toolbar">
        <button id="shareBtn">复制当前句子</button>
        <button id="saveBtn">下载一张海报</button>
      </div>
      <div class="footer">
        <span>纯静态 · 零后端 · 独立部署友好</span>
        <span id="count">已种下 0 株</span>
      </div>
    </div>
    <div class="credits">Memory Garden · standalone edition</div>
  </div>

  <script src="./js/data.js"></script>
  <script src="./js/scene.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>
