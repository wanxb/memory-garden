<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>记忆花园 | Memory Garden</title>
  <meta name="description" content="把一句话种进夜里，长成一株会发光的小植物。一个可独立部署的情绪互动网页。" />
  <meta name="theme-color" content="#08111d" />
  <meta property="og:title" content="记忆花园 | Memory Garden" />
  <meta property="og:description" content="把一句话种进夜里，长成一株会发光的小植物。" />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/app.css" />
</head>
<body>
  <canvas id="garden"></canvas>
  <div class="ui">
    <div class="topbar">
      <div class="brand">
        <div class="kicker">Interactive Poetry Object</div>
        <h1>记忆花园</h1>
        <p>点击夜空，种下一句会发光的话。它会长成一株轻轻摇晃的小植物，把网页变成一片能存放情绪的夜地。</p>
      </div>
      <div class="controls">
        <button id="plantBtn">种一句话</button>
        <button id="randomBtn">随机一句</button>
        <button id="bloomBtn">来一场流星雨</button>
        <button id="clearBtn">清空花园</button>
        <a class="ghost-link" href="https://github.com/wanxb/memory-garden" target="_blank" rel="noopener noreferrer">GitHub 仓库</a>
      </div>
    </div>

    <div></div>

    <div class="panel">
      <h2>把一句话种进夜里</h2>
      <p>每次点击，都会长出一株带着句子的微光植物。它不解决问题，但会让页面多一点呼吸感，这就已经挺值了。</p>
      <div class="quote" id="quoteBox">试试点击任意位置，或者点右上角“种一句话”。</div>
      <div class="toolbar">
        <button id="shareBtn">复制当前句子</button>
        <button id="saveBtn">下载一张海报</button>
      </div>
      <div class="footer">
        <span>纯静态 · 零后端 · 独立部署友好</span>
        <span id="count">已种下 0 株</span>
      </div>
    </div>
    <div class="credits">Memory Garden · standalone edition</div>
  </div>

  <script src="./js/data.js"></script>
  <script src="./js/scene.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>
