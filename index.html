<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>记忆花园 | Memory Garden</title>
  <meta name="description" content="把一句话种进夜里，长成一株会发光的小植物。一个可独立部署的情绪互动网页。" />
  <meta name="theme-color" content="#08111d" />
  <meta property="og:title" content="记忆花园 | Memory Garden" />
  <meta property="og:description" content="把一句话种进夜里，长成一株会发光的小植物。" />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <style>
    :root {
      --bg1: #07111f;
      --bg2: #102845;
      --glow: #8ee7ff;
      --leaf: #7cf0c6;
      --pink: #ffc2de;
      --gold: #fff0d2;
      --text: #ecf7ff;
      --muted: rgba(236,247,255,.72);
      --card: rgba(255,255,255,.08);
      --border: rgba(255,255,255,.16);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif; }
    body {
      background:
        radial-gradient(circle at 20% 20%, rgba(142,231,255,.18), transparent 22%),
        radial-gradient(circle at 80% 10%, rgba(255,194,222,.16), transparent 20%),
        linear-gradient(180deg, var(--bg2), var(--bg1) 56%, #04070d);
      color: var(--text);
    }
    canvas { position: fixed; inset: 0; }
    .ui {
      position: relative;
      z-index: 2;
      min-height: 100%;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 22px;
      pointer-events: none;
    }
    .topbar, .panel, .footer, .credits { pointer-events: auto; }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    .brand {
      max-width: 420px;
      padding: 14px 16px;
      border: 1px solid var(--border);
      background: rgba(5,12,24,.35);
      backdrop-filter: blur(12px);
      border-radius: 22px;
      box-shadow: 0 10px 30px rgba(0,0,0,.18);
    }
    .kicker { color: rgba(236,247,255,.56); font-size: 12px; letter-spacing: .12em; text-transform: uppercase; }
    .brand h1 { margin: 6px 0 8px; font-size: 28px; }
    .brand p { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.7; }
    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      max-width: 420px;
    }
    button {
      border: 1px solid var(--border);
      background: rgba(255,255,255,.08);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
      transition: .2s ease;
    }
    button:hover { transform: translateY(-1px); background: rgba(255,255,255,.14); }
    .panel {
      align-self: end;
      width: min(460px, calc(100vw - 44px));
      padding: 18px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(10,20,35,.62), rgba(7,11,22,.48));
      backdrop-filter: blur(18px);
      border-radius: 24px;
      box-shadow: 0 24px 60px rgba(0,0,0,.28);
    }
    .panel h2 { margin: 0 0 8px; font-size: 22px; }
    .panel p { margin: 0 0 14px; line-height: 1.7; color: var(--muted); }
    .quote {
      min-height: 86px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      line-height: 1.8;
      font-size: 15px;
    }
    .toolbar { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
    .credits {
      position: absolute;
      right: 22px;
      bottom: 22px;
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      color: rgba(236,247,255,.52);
      font-size: 12px;
    }
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      color: rgba(236,247,255,.55);
      font-size: 12px;
      padding-top: 14px;
    }
    @media (max-width: 840px) {
      .topbar, .footer { flex-direction: column; align-items: stretch; }
      .controls { justify-content: flex-start; max-width: none; }
      .panel { width: 100%; }
      .credits { position: static; margin-top: 10px; width: fit-content; }
    }
  </style>
</head>
<body>
  <canvas id="garden"></canvas>
  <div class="ui">
    <div class="topbar">
      <div class="brand">
        <div class="kicker">Interactive Poetry Object</div>
        <h1>记忆花园</h1>
        <p>点击夜空，种下一句会发光的话。它会长成一株轻轻摇晃的小植物，把网页变成一片能存放情绪的夜地。</p>
      </div>
      <div class="controls">
        <button id="plantBtn">种一句话</button>
        <button id="randomBtn">随机一句</button>
        <button id="bloomBtn">来一场流星雨</button>
        <button id="clearBtn">清空花园</button>
      </div>
    </div>

    <div></div>

    <div class="panel">
      <h2>把一句话种进夜里</h2>
      <p>每次点击，都会长出一株带着句子的微光植物。它不解决问题，但会让页面多一点呼吸感，这就已经挺值了。</p>
      <div class="quote" id="quoteBox">试试点击任意位置，或者点右上角“种一句话”。</div>
      <div class="toolbar">
        <button id="shareBtn">复制当前句子</button>
        <button id="saveBtn">下载一张海报</button>
      </div>
      <div class="footer">
        <span>纯静态 · 零后端 · 独立部署友好</span>
        <span id="count">已种下 0 株</span>
      </div>
    </div>
    <div class="credits">Memory Garden · standalone edition</div>
  </div>

  <script>
    const canvas = document.getElementById('garden');
    const ctx = canvas.getContext('2d');
    const quoteBox = document.getElementById('quoteBox');
    const countEl = document.getElementById('count');
    const randomBtn = document.getElementById('randomBtn');
    const clearBtn = document.getElementById('clearBtn');
    const plantBtn = document.getElementById('plantBtn');
    const bloomBtn = document.getElementById('bloomBtn');
    const shareBtn = document.getElementById('shareBtn');
    const saveBtn = document.getElementById('saveBtn');

    const seeds = [];
    const fireflies = [];
    const meteors = [];
    const quotes = [
      '慢一点，灵感会追上来。',
      '不是所有空白都需要被填满。',
      '你在认真做的小东西，会替你发光。',
      '世界很吵，作品要有自己的呼吸。',
      '温柔不是弱，是稳定输出的力量。',
      '有些创作，不为解决问题，只为让人停一下。',
      '先把种子埋下，春天会自己处理后面的事。',
      '极简不是少，是只留下必要的浪漫。',
      '今晚的你，也值得被温柔对待。',
      '页面会熄灭，句子不会。'
    ];
    let currentQuote = '';
    let pendingPlant = false;

    function resize() {
      canvas.width = innerWidth * devicePixelRatio;
      canvas.height = innerHeight * devicePixelRatio;
      canvas.style.width = innerWidth + 'px';
      canvas.style.height = innerHeight + 'px';
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    }
    addEventListener('resize', resize);
    resize();

    function randomQuote() {
      return quotes[(Math.random() * quotes.length) | 0];
    }

    function launchMeteorBurst() {
      for (let i = 0; i < 9; i++) {
        meteors.push({
          x: Math.random() * innerWidth * 0.9,
          y: Math.random() * innerHeight * 0.3,
          vx: 6 + Math.random() * 6,
          vy: 2 + Math.random() * 4,
          life: 1,
          size: 60 + Math.random() * 80
        });
      }
    }

    function addSeed(x, y, text) {
      const hue = 170 + Math.random() * 70;
      currentQuote = text;
      seeds.push({
        x, y, text,
        age: 0,
        stem: 50 + Math.random() * 100,
        sway: Math.random() * Math.PI * 2,
        bloom: 12 + Math.random() * 20,
        hue
      });
      quoteBox.textContent = text;
      countEl.textContent = `已种下 ${seeds.length} 株`;
      for (let i = 0; i < 12; i++) {
        fireflies.push({
          x, y,
          vx: (Math.random() - 0.5) * 1.8,
          vy: -Math.random() * 1.9 - 0.4,
          size: 1 + Math.random() * 3,
          life: 1,
          hue
        });
      }
    }

    function promptAndPlant(x, y) {
      const text = prompt('种一句话进花园：', randomQuote());
      if (text === null) return;
      const value = text.trim() || '今夜也有微光。';
      addSeed(x, y, value);
    }

    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      if (pendingPlant) {
        addSeed(x, y, currentQuote || randomQuote());
        pendingPlant = false;
        quoteBox.textContent = `已落种：${currentQuote}`;
        return;
      }
      promptAndPlant(x, y);
    });

    plantBtn.addEventListener('click', () => {
      currentQuote = randomQuote();
      pendingPlant = true;
      quoteBox.textContent = `准备落种：${currentQuote}（现在点击夜空任意位置）`;
    });

    randomBtn.addEventListener('click', () => {
      addSeed(120 + Math.random() * Math.max(120, innerWidth - 240), innerHeight * (0.52 + Math.random() * 0.28), randomQuote());
    });

    bloomBtn.addEventListener('click', launchMeteorBurst);

    clearBtn.addEventListener('click', () => {
      seeds.length = 0;
      fireflies.length = 0;
      meteors.length = 0;
      currentQuote = '';
      pendingPlant = false;
      quoteBox.textContent = '花园重新安静了。再点一次，重新种。';
      countEl.textContent = '已种下 0 株';
    });

    shareBtn.addEventListener('click', async () => {
      const text = currentQuote || quoteBox.textContent;
      try {
        await navigator.clipboard.writeText(text);
        quoteBox.textContent = `已复制：${text}`;
      } catch {
        quoteBox.textContent = '复制失败了，可能是浏览器权限不让。';
      }
    });

    saveBtn.addEventListener('click', () => {
      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/png');
      a.download = 'memory-garden-poster.png';
      a.click();
    });

    function drawBackground(t) {
      const g = ctx.createLinearGradient(0, 0, 0, innerHeight);
      g.addColorStop(0, '#102845');
      g.addColorStop(.58, '#07111f');
      g.addColorStop(1, '#04070d');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, innerWidth, innerHeight);

      for (let i = 0; i < 120; i++) {
        const x = (i * 173) % innerWidth;
        const y = (i * 97) % (innerHeight * 0.72);
        const tw = 0.4 + 0.6 * Math.sin(t * 0.001 + i * 0.7);
        ctx.fillStyle = `rgba(255,255,255,${0.06 + tw * 0.28})`;
        ctx.fillRect(x, y, 1.5, 1.5);
      }

      ctx.fillStyle = 'rgba(15,35,30,.92)';
      ctx.beginPath();
      ctx.moveTo(0, innerHeight);
      ctx.lineTo(0, innerHeight * 0.72);
      ctx.quadraticCurveTo(innerWidth * 0.2, innerHeight * 0.64, innerWidth * 0.42, innerHeight * 0.77);
      ctx.quadraticCurveTo(innerWidth * 0.62, innerHeight * 0.87, innerWidth, innerHeight * 0.7);
      ctx.lineTo(innerWidth, innerHeight);
      ctx.closePath();
      ctx.fill();
    }

    function drawSeed(seed, t) {
      seed.age += 0.012;
      const growth = Math.min(seed.age, 1);
      const stemTopY = seed.y - seed.stem * growth;
      const sway = Math.sin(t * 0.0018 + seed.sway) * 12 * growth;

      ctx.strokeStyle = `hsla(${seed.hue}, 70%, 68%, .95)`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(seed.x, seed.y);
      ctx.quadraticCurveTo(seed.x + sway * 0.35, seed.y - seed.stem * 0.45, seed.x + sway, stemTopY);
      ctx.stroke();

      for (let i = 0; i < 3; i++) {
        const p = (i + 1) / 4;
        const lx = seed.x + sway * p;
        const ly = seed.y - seed.stem * p;
        ctx.fillStyle = 'rgba(124,240,198,.28)';
        ctx.beginPath();
        ctx.ellipse(lx - 8, ly, 14 * growth, 7 * growth, -0.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(lx + 8, ly, 14 * growth, 7 * growth, 0.5, 0, Math.PI * 2);
        ctx.fill();
      }

      const bloom = seed.bloom * (0.65 + 0.35 * Math.sin(t * 0.003 + seed.sway));
      ctx.shadowBlur = 24;
      ctx.shadowColor = `hsla(${seed.hue}, 95%, 70%, .8)`;
      ctx.fillStyle = `hsla(${seed.hue}, 95%, 75%, .95)`;
      for (let i = 0; i < 6; i++) {
        const a = (Math.PI * 2 / 6) * i + t * 0.0004;
        ctx.beginPath();
        ctx.ellipse(seed.x + sway + Math.cos(a) * bloom * 0.7, stemTopY + Math.sin(a) * bloom * 0.7, bloom * 0.7, bloom * 0.35, a, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.beginPath();
      ctx.fillStyle = 'rgba(255,250,236,.96)';
      ctx.arc(seed.x + sway, stemTopY, bloom * 0.42, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      ctx.fillStyle = 'rgba(236,247,255,.82)';
      ctx.font = '12px Inter, sans-serif';
      ctx.fillText(seed.text.slice(0, 20), seed.x + sway + 14, stemTopY - 10);
    }

    function drawFirefly(f) {
      f.x += f.vx;
      f.y += f.vy;
      f.life -= 0.015;
      ctx.fillStyle = `hsla(${f.hue}, 100%, 72%, ${Math.max(f.life,0)})`;
      ctx.beginPath();
      ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawMeteor(m) {
      m.x += m.vx;
      m.y += m.vy;
      m.life -= 0.014;
      const grad = ctx.createLinearGradient(m.x, m.y, m.x - m.size, m.y - m.size * 0.35);
      grad.addColorStop(0, `rgba(255,240,210,${m.life})`);
      grad.addColorStop(1, 'rgba(255,240,210,0)');
      ctx.strokeStyle = grad;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(m.x, m.y);
      ctx.lineTo(m.x - m.size, m.y - m.size * 0.35);
      ctx.stroke();
    }

    function loop(t) {
      drawBackground(t);
      seeds.forEach(seed => drawSeed(seed, t));
      for (let i = fireflies.length - 1; i >= 0; i--) {
        drawFirefly(fireflies[i]);
        if (fireflies[i].life <= 0) fireflies.splice(i, 1);
      }
      for (let i = meteors.length - 1; i >= 0; i--) {
        drawMeteor(meteors[i]);
        if (meteors[i].life <= 0) meteors.splice(i, 1);
      }
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>
</body>
</html>
